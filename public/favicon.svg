<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cda45e" />
      <stop offset="100%" stop-color="#1dbf73" />
    </linearGradient>
  </defs>
  <!-- Outer orbital ring representing Gravity -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="200 60" transform="rotate(-45 50 50)" />
  <!-- Center Core dot representing Pro/Milestone -->
  <circle cx="50" cy="50" r="14" fill="#1dbf73" />
  <!-- Small accent dot representing Gravity dot -->
  <circle cx="78" cy="22" r="8" fill="#cda45e" />
</svg>
